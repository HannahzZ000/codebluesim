<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBlue Sim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0a1628 100%);
            color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 48px;
            max-width: 600px;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(90deg, #0A84FF, #64B5F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        p {
            font-size: 18px;
            color: #8e8e93;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            margin-top: 32px;
            padding: 8px 20px;
            border: 1px solid #0A84FF;
            border-radius: 20px;
            color: #0A84FF;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🫀</div>
        <h1>CodeBlue Sim</h1>
        <p>Multiplayer medical emergency training for Apple Vision Pro.</p>
        <span class="badge">Coming Soon</span>
    </div>
</body>
</html>
